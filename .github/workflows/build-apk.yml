name: 构建 APK 安装包

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK
        run: |
          export SDK=$HOME/android-sdk
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          mkdir -p $SDK/cmdline-tools
          cd $SDK/cmdline-tools
          curl -sLO https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip
          mv cmdline-tools latest
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK --licenses 2>&1
          $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1

      - name: 安装 Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: 初始化 TWA
        run: |
          echo "n" | bubblewrap init --manifest https://six-wind.github.io/snake-game/manifest.json --directory twa-project 2>&1

      - name: 构建 APK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          cd twa-project
          bubblewrap build 2>&1

      - name: 查找并上传 APK
        run: |
          echo "=== Build output ==="
          find twa-project -name "*.apk" 2>/dev/null
          find . -name "*.apk" 2>/dev/null
          echo "=== Listing twa-project ==="
          ls -la twa-project/ 2>/dev/null

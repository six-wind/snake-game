name: 构建 APK 安装包

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Android SDK
        run: |
          # 下载 Android 命令行工具
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -LO https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip
          mv cmdline-tools latest
          rm commandlinetools-linux-*.zip

          # 设置环境变量
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

          # 接受许可
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

          # 安装必要组件
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" > /dev/null 2>&1 || true

      - name: 准备游戏文件
        run: |
          mkdir -p www
          cp index.html manifest.json sw.js www/
          cp -r icons www/

      - name: 安装 Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: 初始化 Android 项目
        run: npx cap add android

      - name: 同步资源
        run: npx cap sync android

      - name: 构建 Debug APK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 复制 APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk snake-game.apk

      - name: 上传 APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: 贪吃蛇-APK
          path: snake-game.apk

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "贪吃蛇 v${{ github.run_number }}"
          files: snake-game.apk
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

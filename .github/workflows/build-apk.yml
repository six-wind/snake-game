name: 构建 APK 安装包

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK
        run: |
          export SDK=$HOME/android-sdk
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          mkdir -p $SDK/cmdline-tools
          cd $SDK/cmdline-tools
          curl -sLO https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip
          mv cmdline-tools latest
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK --licenses 2>&1 | tail -1
          $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -3

      - name: 安装 Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: 初始化 TWA 项目
        run: |
          # 回答 n (不用bubblewrap安装JDK，用系统的)
          printf "n\n" | bubblewrap init \
            --manifest https://six-wind.github.io/snake-game/manifest.json \
            --directory twa-project 2>&1 | tail -10
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 构建 APK
        run: |
          cd twa-project
          bubblewrap build 2>&1 | tail -10

      - name: 查找 APK
        run: find twa-project -name "*.apk" -exec cp {} snake-game.apk \; && ls -la snake-game.apk

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 贪吃蛇-APK
          path: snake-game.apk

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "贪吃蛇 v${{ github.run_number }}"
          files: snake-game.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

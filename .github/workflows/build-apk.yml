name: 构建 APK 安装包

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          curl -sL -o tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q tools.zip
          mv cmdline-tools latest
          rm tools.zip

          # 接受许可
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses 2>&1

          # 安装 SDK 组件
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1

          # 验证
          ls $ANDROID_SDK_ROOT/platforms/
          ls $ANDROID_SDK_ROOT/build-tools/

      - name: 创建 local.properties
        run: |
          echo "sdk.dir=$HOME/android-sdk" > android-app/local.properties

      - name: 设置 Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: 构建 Debug APK
        working-directory: android-app
        run: gradle assembleDebug --info 2>&1 | tail -100

      - name: 列出构建输出
        run: find android-app/app/build -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: 复制 APK
        if: success()
        run: cp android-app/app/build/outputs/apk/debug/app-debug.apk snake-game.apk

      - name: 上传 APK (Artifact)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: 贪吃蛇-APK
          path: snake-game.apk

      - name: 发布到 GitHub Releases
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "贪吃蛇 v${{ github.run_number }}"
          files: snake-game.apk
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: 构建 APK 安装包

on:
  push:
    branches: [master]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: 安装 Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: 准备游戏文件
        run: |
          mkdir www
          cp index.html manifest.json sw.js www/
          cp -r icons www/

      - name: 初始化 Android 项目
        run: |
          npx cap init "贪吃蛇" "com.snake.game" --web-dir=www
          npx cap add android

      - name: 生成签名密钥
        run: |
          keytool -genkey -v \
            -keystore snake-release.keystore \
            -alias snake \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass snake123 \
            -keypass snake123 \
            -dname "CN=SnakeGame, OU=Dev, O=Snake, L=Beijing, ST=Beijing, C=CN"

      - name: 构建 Release APK
        run: |
          cd android
          # 创建 keystore 配置
          echo 'RELEASE_STORE_FILE=../../snake-release.keystore' > release-signing.properties
          echo 'RELEASE_STORE_PASSWORD=snake123' >> release-signing.properties
          echo 'RELEASE_KEY_ALIAS=snake' >> release-signing.properties
          echo 'RELEASE_KEY_PASSWORD=snake123' >> release-signing.properties
          # 构建
          ./gradlew assembleRelease
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: 上传 APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: 贪吃蛇-APK
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: 复制 APK 用于发布
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk snake-game.apk

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "贪吃蛇 v${{ github.run_number }}"
          files: snake-game.apk
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

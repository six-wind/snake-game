<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="贪吃蛇">
    <meta name="theme-color" content="#0f0f23">
    <title>贪吃蛇 - 下载</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; background: #0f0f23; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { display:flex; justify-content:center; align-items:center; min-height:100vh; min-height:100dvh; padding:20px; }
        .page { width:100%; max-width:420px; text-align:center; }
        .app-icon { font-size:100px; display:block; margin-bottom:16px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .app-name { color:#fff; font-size:32px; font-weight:900; margin-bottom:6px; }
        .app-desc { color:#888; font-size:15px; margin-bottom:32px; }
        .features { display:flex; gap:12px; margin-bottom:36px; flex-wrap:wrap; justify-content:center; }
        .feature { background:#16213e; border:1px solid #0f3460; border-radius:12px; padding:10px 16px; color:#a0a0b8; font-size:13px; white-space:nowrap; }
        .btn-primary {
            display:block; width:100%; padding:18px; background:linear-gradient(135deg, #e94560, #c0392b);
            color:#fff; border:none; border-radius:16px; font-size:20px; font-weight:700;
            cursor:pointer; text-decoration:none; letter-spacing:1px;
            box-shadow:0 8px 32px rgba(233,69,96,0.35); transition:all 0.15s; margin-bottom:12px;
        }
        .btn-primary:active { transform:scale(0.96); box-shadow:0 4px 16px rgba(233,69,96,0.25); }
        .btn-secondary {
            display:block; width:100%; padding:14px; background:rgba(255,255,255,0.06);
            color:#888; border:1px solid rgba(255,255,255,0.1); border-radius:14px;
            font-size:15px; cursor:pointer; text-decoration:none; transition:all 0.15s;
        }
        .btn-secondary:active { background:rgba(255,255,255,0.12); }
        .ios-steps { background:#16213e; border-radius:16px; padding:20px; margin-bottom:12px; text-align:left; color:#ccc; font-size:14px; line-height:2; }
        .ios-steps .step-num { display:inline-block; width:22px; height:22px; background:#e94560; color:#fff; border-radius:50%; text-align:center; line-height:22px; font-size:12px; margin-right:8px; }
        .divider { color:#333; margin:20px 0; font-size:12px; }
    </style>
</head>
<body>
<div class="page" id="page">
    <span class="app-icon">🐍</span>
    <div class="app-name">贪吃蛇</div>
    <div class="app-desc">经典休闲小游戏</div>
    <div class="features">
        <span class="feature">🎮 滑动操控</span>
        <span class="feature">⚡ 逐渐加速</span>
        <span class="feature">📡 离线可玩</span>
        <span class="feature">📱 全屏沉浸</span>
    </div>

    <!-- 安卓下载按钮 -->
    <a class="btn-primary" id="androidBtn" href="https://github.com/six-wind/snake-game/releases/latest/download/snake-game.apk" style="display:none;">
        📥 下载安装 (Android)
    </a>

    <!-- iOS 说明 -->
    <div class="ios-steps" id="iosSteps" style="display:none;">
        <div style="color:#e94560;font-weight:700;margin-bottom:8px;">📲 iPhone 安装方法</div>
        <div><span class="step-num">1</span> 点浏览器底部 <b>分享</b> 按钮</div>
        <div><span class="step-num">2</span> 往下滑找到 <b>「添加到主屏幕」</b></div>
        <div><span class="step-num">3</span> 点右上角 <b>「添加」</b></div>
        <div style="color:#888;margin-top:8px;font-size:12px;">桌面出现 🐍 图标后，就像普通 App 一样啦</div>
    </div>

    <!-- 电脑端 -->
    <div id="pcInfo" style="display:none; color:#888; font-size:14px; margin-bottom:12px;">
        💻 在手机上打开此链接即可下载安装
    </div>

    <!-- 在线试玩 -->
    <a class="btn-secondary" id="playLink" href="game.html">在浏览器中直接玩 →</a>
</div>

<script>
(function(){
    const isAndroid = /android/i.test(navigator.userAgent);
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    // 强制刷新链接：每次打开都带不同时间戳
    const ts = Date.now();
    document.getElementById('playLink').href = 'game.html?t=' + ts;

    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;

    if (isStandalone || window.location.search.includes('app=true')) {
        window.location.href = 'game.html?t=' + ts;
        return;
    }

    // 显示对应的下载引导
    if (isAndroid) {
        document.getElementById('androidBtn').style.display = 'block';
    } else if (isIOS) {
        document.getElementById('iosSteps').style.display = 'block';
    } else {
        document.getElementById('pcInfo').style.display = 'block';
    }
})();
</script>
</body>
</html>
